<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auction House</title>
  <style>
    /* ─── Reset & Base ─────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:   #f5c842;
      --gold2:  #e8a800;
      --dark:   #0d0d1a;
      --darker: #07070f;
      --card:   #13132a;
      --border: #2a2a5a;
      --text:   #e8e8ff;
      --muted:  #7878a8;
      --green:  #22c55e;
      --red:    #ef4444;
      --blue:   #60a5fa;
      --purple: #a78bfa;
    }

    body {
      background: var(--darker);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── Animated starfield background ──────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 50% 10%, rgba(255,255,255,.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 70% 80%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 90% 40%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 90%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 60% 50%, rgba(255,255,255,.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 80% 15%, rgba(255,255,255,.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 75%, rgba(255,255,255,.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 15% 45%, rgba(255,255,255,.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
      animation: twinkle 4s ease-in-out infinite alternate;
    }
    @keyframes twinkle {
      0%   { opacity: .6; }
      100% { opacity: 1; }
    }

    /* ─── Header ──────────────────────────────────────────────────── */
    header {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2.5rem 1rem 1.5rem;
      background: linear-gradient(180deg, rgba(245,200,66,.08) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .gavel-icon { font-size: 3rem; animation: swing .8s ease-in-out infinite alternate; display: inline-block; }
    @keyframes swing {
      0%   { transform: rotate(-15deg); }
      100% { transform: rotate(15deg); }
    }
    header h1 {
      font-size: clamp(1.8rem, 5vw, 3rem);
      font-weight: 800;
      letter-spacing: .08em;
      background: linear-gradient(90deg, var(--gold), #fff, var(--gold2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: .4rem;
    }
    header p { color: var(--muted); font-size: .95rem; margin-top: .3rem; letter-spacing: .05em; }

    /* ─── API Base URL bar ────────────────────────────────────────── */
    .api-bar {
      display: flex;
      align-items: center;
      gap: .6rem;
      max-width: 560px;
      margin: 1rem auto 0;
      padding: 0 1rem;
    }
    .api-bar label { color: var(--muted); font-size: .8rem; white-space: nowrap; }
    .api-bar input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: .45rem .8rem;
      font-size: .85rem;
      outline: none;
      transition: border-color .2s;
    }
    .api-bar input:focus { border-color: var(--gold); }

    /* ─── Main layout ─────────────────────────────────────────────── */
    main {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 1rem 4rem;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
    }
    @media (max-width: 700px) { main { grid-template-columns: 1fr; } }

    /* ─── Cards ───────────────────────────────────────────────────── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.4rem 1.6rem;
      transition: transform .2s, box-shadow .2s;
      animation: fadeUp .5s ease both;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 8px 32px rgba(245,200,66,.08); }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card:nth-child(1) { animation-delay: .05s; }
    .card:nth-child(2) { animation-delay: .10s; }
    .card:nth-child(3) { animation-delay: .15s; }
    .card:nth-child(4) { animation-delay: .20s; }
    .card:nth-child(5) { animation-delay: .25s; grid-column: 1 / -1; }

    .card-title {
      display: flex;
      align-items: center;
      gap: .6rem;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: .04em;
      color: var(--gold);
      margin-bottom: 1.1rem;
      text-transform: uppercase;
    }
    .card-title .icon { font-size: 1.3rem; }

    /* ─── Bid Form ────────────────────────────────────────────────── */
    .bid-row {
      display: flex;
      gap: .7rem;
      align-items: stretch;
    }
    .bid-row input[type="number"] {
      flex: 1;
      background: var(--darker);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1.1rem;
      padding: .6rem 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .bid-row input[type="number"]:focus { border-color: var(--gold); }

    /* ─── Buttons ─────────────────────────────────────────────────── */
    .btn {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: .9rem;
      font-weight: 700;
      padding: .65rem 1.3rem;
      letter-spacing: .03em;
      transition: filter .2s, transform .1s;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
    }
    .btn:active { transform: scale(.96); }
    .btn-gold  { background: linear-gradient(135deg, var(--gold), var(--gold2)); color: #111; }
    .btn-red   { background: linear-gradient(135deg, #ef4444, #b91c1c); color: #fff; }
    .btn-blue  { background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; }
    .btn-green { background: linear-gradient(135deg, #22c55e, #15803d); color: #fff; }
    .btn-purple{ background: linear-gradient(135deg, #a78bfa, #7c3aed); color: #fff; }
    .btn:hover { filter: brightness(1.15); }
    .btn:disabled { opacity: .5; cursor: not-allowed; filter: none; }

    /* ─── Refresh / Reset row ─────────────────────────────────────── */
    .refresh-row {
      display: flex;
      gap: .7rem;
      align-items: center;
      flex-wrap: wrap;
    }
    .refresh-row input[type="number"] {
      width: 80px;
      background: var(--darker);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
      padding: .5rem .7rem;
      outline: none;
      transition: border-color .2s;
    }
    .refresh-row input[type="number"]:focus { border-color: var(--purple); }

    /* ─── Info boxes ──────────────────────────────────────────────── */
    .info-box {
      background: var(--darker);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: .8rem 1.1rem;
      font-size: .9rem;
      color: var(--muted);
      min-height: 3.2rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      transition: background .3s;
    }
    .info-box .value {
      color: var(--text);
      font-size: 1.5rem;
      font-weight: 800;
      margin-left: auto;
    }
    .info-box .value.gold  { color: var(--gold); }
    .info-box .value.green { color: var(--green); }
    .info-box .value.red   { color: var(--red); }

    /* ─── Offers list ─────────────────────────────────────────────── */
    #offers-list {
      display: flex;
      flex-wrap: wrap;
      gap: .6rem;
      min-height: 2.5rem;
    }
    .bid-chip {
      background: linear-gradient(135deg, #1e1e45, #2a2a5a);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .35rem .9rem;
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      animation: popIn .3s cubic-bezier(.34,1.56,.64,1) both;
      display: flex;
      align-items: center;
      gap: .4rem;
    }
    .bid-chip.winner  { border-color: var(--gold); color: var(--gold); box-shadow: 0 0 12px rgba(245,200,66,.35); }
    .bid-chip.lowest  { border-color: var(--red); color: var(--red); }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.5); }
      to   { opacity: 1; transform: scale(1); }
    }
    .empty-hint { color: var(--muted); font-style: italic; font-size: .9rem; }

    /* ─── Status toast ────────────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: .7rem 1.6rem;
      font-size: .9rem;
      font-weight: 600;
      color: var(--text);
      z-index: 999;
      transition: transform .35s cubic-bezier(.34,1.56,.64,1), opacity .35s;
      opacity: 0;
      pointer-events: none;
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    #toast.success { border-color: var(--green); color: var(--green); }
    #toast.error   { border-color: var(--red);   color: var(--red); }
    #toast.info    { border-color: var(--blue);  color: var(--blue); }

    /* ─── Loading spinner ─────────────────────────────────────────── */
    .spinner {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Pulse indicator ─────────────────────────────────────────── */
    .live-dot {
      width: 8px; height: 8px;
      background: var(--green);
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(34,197,94,.6); }
      50%       { box-shadow: 0 0 0 6px rgba(34,197,94,0); }
    }
  </style>
</head>
<body>

<!-- ─── Header ──────────────────────────────────────────────────────── -->
<header>
  <div class="gavel-icon">🔨</div>
  <h1>AUCTION HOUSE</h1>
  <p><span class="live-dot"></span>&nbsp; Live Bidding Dashboard</p>
  <div class="api-bar">
    <label>API URL</label>
    <input id="api-base" type="text" value="http://127.0.0.1:8081" placeholder="http://127.0.0.1:8081" />
  </div>
</header>

<!-- ─── Main Grid ────────────────────────────────────────────────────── -->
<main>

  <!-- 1 · Place a Bid -->
  <div class="card">
    <div class="card-title"><span class="icon">💰</span> Place a Bid</div>
    <div class="bid-row">
      <input id="bid-input" type="number" min="1" placeholder="Enter amount…" />
      <button class="btn btn-gold" onclick="placeBid()">⚡ BID</button>
    </div>
  </div>

  <!-- 2 · Winner -->
  <div class="card">
    <div class="card-title"><span class="icon">🏆</span> Current Winner</div>
    <div class="info-box">
      <span>Highest bid</span>
      <span class="value gold" id="winner-val">—</span>
    </div>
    <br/>
    <button class="btn btn-blue" style="width:100%" onclick="fetchWinner()">🔄 Refresh</button>
  </div>

  <!-- 3 · Remove Lowest -->
  <div class="card">
    <div class="card-title"><span class="icon">🗑️</span> Remove Lowest Bid</div>
    <div class="info-box" style="margin-bottom:1rem">
      <span>Last removed</span>
      <span class="value red" id="removed-val">—</span>
    </div>
    <button class="btn btn-red" style="width:100%" onclick="removeLowest()">❌ Remove Lowest</button>
  </div>

  <!-- 4 · Max Offers / Reset Auction -->
  <div class="card">
    <div class="card-title"><span class="icon">⚙️</span> Auction Settings</div>
    <div class="info-box" style="margin-bottom:1rem">
      <span>Max bids allowed</span>
      <span class="value" id="max-val">—</span>
    </div>
    <div class="refresh-row">
      <input id="max-input" type="number" min="1" value="3" title="New max offers" />
      <button class="btn btn-purple" onclick="refreshAuction()">🔁 Reset Auction</button>
      <button class="btn btn-green" onclick="fetchMax()">📊 Get Max</button>
    </div>
  </div>

  <!-- 5 · All Offers (full width) -->
  <div class="card">
    <div class="card-title">
      <span class="icon">📋</span> Current Bids
      <button class="btn btn-blue" style="margin-left:auto;padding:.4rem .9rem;font-size:.8rem" onclick="fetchOffers()">🔄 Refresh</button>
    </div>
    <div id="offers-list"><span class="empty-hint">No bids yet…</span></div>
  </div>

</main>

<!-- ─── Toast ────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<!-- ─── JavaScript ──────────────────────────────────────────────────── -->
<script>
  const base = () => document.getElementById('api-base').value.replace(/\/$/, '');

  // ── Toast helper ──────────────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'info') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = ''; }, 3000);
  }

  // ── Fetch wrapper ─────────────────────────────────────────────────
  async function api(path, method = 'GET', body = null) {
    const opts = { method, headers: { 'Content-Type': 'application/json' } };
    if (body !== null) opts.body = JSON.stringify(body);
    const res = await fetch(base() + path, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw { status: res.status, detail: data.detail || 'Error' };
    return data;
  }

  // ── Render offers ─────────────────────────────────────────────────
  function renderOffers(offers) {
    const el = document.getElementById('offers-list');
    if (!offers || offers.length === 0) {
      el.innerHTML = '<span class="empty-hint">No bids yet…</span>';
      return;
    }
    const max = Math.max(...offers);
    const min = Math.min(...offers);
    // Sort descending
    const sorted = [...offers].sort((a, b) => b - a);
    el.innerHTML = sorted.map(o => {
      let cls = '';
      if (o === max) cls = 'winner';
      else if (o === min) cls = 'lowest';
      const label = o === max ? '👑' : o === min ? '⬇️' : '•';
      return `<span class="bid-chip ${cls}">${label} $${o.toLocaleString()}</span>`;
    }).join('');
  }

  // ── Place a bid ───────────────────────────────────────────────────
  async function placeBid() {
    const input = document.getElementById('bid-input');
    const price = parseInt(input.value, 10);
    if (!price || price <= 0) { showToast('Enter a valid bid amount', 'error'); return; }
    try {
      const data = await api('/bid', 'POST', { price });
      showToast(`✅ Bid of $${price.toLocaleString()} accepted!`, 'success');
      input.value = '';
      fetchAll();
    } catch (e) {
      showToast(`❌ Bid rejected: ${e.detail}`, 'error');
    }
  }

  // ── Fetch winner ──────────────────────────────────────────────────
  async function fetchWinner() {
    try {
      const data = await api('/winner');
      document.getElementById('winner-val').textContent = `$${data.winner.toLocaleString()}`;
      showToast(`🏆 Winner: $${data.winner.toLocaleString()}`, 'success');
    } catch (e) {
      document.getElementById('winner-val').textContent = '—';
      if (e.status === 404) showToast('No bids placed yet', 'info');
      else showToast(`Error: ${e.detail}`, 'error');
    }
  }

  // ── Remove lowest ─────────────────────────────────────────────────
  async function removeLowest() {
    try {
      const data = await api('/lowest', 'DELETE');
      document.getElementById('removed-val').textContent = `$${data.removed.toLocaleString()}`;
      showToast(`🗑️ Removed lowest bid: $${data.removed.toLocaleString()}`, 'info');
      fetchAll();
    } catch (e) {
      if (e.status === 404) showToast('No bids to remove', 'info');
      else showToast(`Error: ${e.detail}`, 'error');
    }
  }

  // ── Fetch offers ──────────────────────────────────────────────────
  async function fetchOffers() {
    try {
      const data = await api('/offers');
      renderOffers(data.offers);
    } catch (e) {
      showToast(`Error fetching offers: ${e.detail}`, 'error');
    }
  }

  // ── Fetch max ─────────────────────────────────────────────────────
  async function fetchMax() {
    try {
      const data = await api('/max-offers');
      document.getElementById('max-val').textContent = data.max_offers;
      showToast(`Max offers: ${data.max_offers}`, 'info');
    } catch (e) {
      showToast(`Error: ${e.detail}`, 'error');
    }
  }

  // ── Refresh / reset auction ───────────────────────────────────────
  async function refreshAuction() {
    const maxVal = parseInt(document.getElementById('max-input').value, 10) || 3;
    try {
      const data = await api(`/refresh-auction/${maxVal}`, 'PUT');
      document.getElementById('max-val').textContent = data.max_offers;
      document.getElementById('winner-val').textContent = '—';
      document.getElementById('removed-val').textContent = '—';
      showToast(`🔁 Auction reset! Max bids: ${data.max_offers}`, 'success');
      fetchAll();
    } catch (e) {
      showToast(`Error: ${e.detail}`, 'error');
    }
  }

  // ── Fetch everything ──────────────────────────────────────────────
  async function fetchAll() {
    await Promise.allSettled([fetchOffers(), fetchWinner(), fetchMax()]);
  }

  // ── Allow Enter key in bid input ──────────────────────────────────
  document.getElementById('bid-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') placeBid();
  });

  // ── Auto-refresh every 5 seconds ─────────────────────────────────
  fetchAll();
  setInterval(fetchAll, 5000);
</script>
</body>
</html>
